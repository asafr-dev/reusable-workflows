name: reusable-node

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "20"
      working_directory:
        type: string
        default: "."
      run_lint:
        type: boolean
        default: true
      run_format:
        type: boolean
        default: true
      run_test:
        type: boolean
        default: true
      test_cmd:
        type: string
        default: ""
      run_typecheck:
        type: boolean
        default: false
      run_build:
        type: boolean
        default: true
      enable_codecov:
        type: boolean
        default: false
      codecov_files:
        type: string
        default: ""
      codecov_flags:
        type: string
        default: ""

jobs:
  node:
    runs-on: ubuntu-latest
    env:
      # Playwright is a dev dependency in some repos but browsers are only needed
      # in dedicated e2e workflows. Skipping the implicit download makes "ci" jobs
      # faster and less flaky.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      # CI speed/noise
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned

      - name: Detect lockfile
        id: lockfile
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pinned
        if: ${{ steps.lockfile.outputs.has_lockfile == 'true' }}
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pinned
        if: ${{ steps.lockfile.outputs.has_lockfile != 'true' }}
        with:
          node-version: ${{ inputs.node_version }}

      - name: Pin npm + registry
        shell: bash
        run: |
          set -euo pipefail
          # Avoid npm CLI flakiness across runner images
          npm i -g npm@10.9.2
          npm config set registry https://registry.npmjs.org/
          npm --version

      - name: Prepare env (if .env.example exists)
        shell: bash
        run: |
          if [ -f .env.example ] && [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Install deps (retry)
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.lockfile.outputs.has_lockfile }}" = "true" ]; then
            cmd=(npm ci)
          else
            cmd=(npm install)
          fi

          for attempt in 1 2 3; do
            echo "Running: ${cmd[*]} (attempt ${attempt}/3)"
            if "${cmd[@]}"; then
              exit 0
            fi
            if [ ${attempt} -lt 3 ]; then
              sleep_time=$((attempt * 7))
              echo "Install failed; retrying in ${sleep_time}s..."
              sleep ${sleep_time}
            fi
          done

          echo "Install failed after retries."
          exit 1

      - name: Format
        if: ${{ inputs.run_format }}
        shell: bash
        run: |
          set -euo pipefail
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['format:check'] ? 0 : 1)"; then
            npm run -s format:check
          else
            npx --yes prettier@3.3.3 --check . --ignore-unknown
          fi

      - name: Lint
        if: ${{ inputs.run_lint }}
        run: npm run -s lint --if-present

      - name: Typecheck
        if: ${{ inputs.run_typecheck }}
        run: npm run -s typecheck --if-present

      - name: Test
        if: ${{ inputs.run_test }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.test_cmd }}" ]; then
            bash -lc "${{ inputs.test_cmd }}"
          else
            npm run -s test --if-present
          fi

      - name: Validate Codecov inputs
        if: ${{ inputs.enable_codecov }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ inputs.codecov_files }}" ]; then
            echo "ERROR: enable_codecov is true but codecov_files is empty." >&2
            exit 1
          fi

      - name: Validate Codecov coverage file(s) exist
        if: ${{ inputs.run_test && inputs.enable_codecov }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          IFS=',' read -r -a codecov_files <<< "${{ inputs.codecov_files }}"
          for raw in "${codecov_files[@]}"; do
            file="$(printf '%s' "$raw" | xargs)"
            [ -z "$file" ] && continue
            if [ ! -f "$file" ]; then
              echo "ERROR: declared Codecov file not found: $file" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Upload coverage to Codecov
        if: ${{ inputs.run_test && inputs.enable_codecov }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # pinned SHA
        with:
          use_oidc: true
          directory: ${{ inputs.working_directory }}
          files: ${{ inputs.codecov_files }}
          flags: ${{ inputs.codecov_flags }}
          disable_search: true
          fail_ci_if_error: true

      - name: Build
        if: ${{ inputs.run_build }}
        run: npm run -s build --if-present
