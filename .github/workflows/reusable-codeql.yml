name: reusable-codeql

on:
  workflow_call:
    inputs:
      languages:
        type: string
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned
      - uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # pinned
        with:
          languages: ${{ inputs.languages }}
      - uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # pinned
