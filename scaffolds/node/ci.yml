name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: <OWNER>/<REUSABLE_WORKFLOWS_REPO>/.github/workflows/reusable-node.yml@v1
    with:
      node_version: 20
      working_directory: .
      run_lint: true
      run_format: true
      run_test: true
      run_typecheck: true
      run_build: true

  ci:
    if: ${{ always() }}
    needs:
      - pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Gate required check
        run: |
          echo "pipeline: ${{ needs.pipeline.result }}"
          if [[ "${{ needs.pipeline.result }}" != "success" ]]; then
            exit 1
          fi
